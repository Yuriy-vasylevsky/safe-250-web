<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СЕЙФ 250</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>

  <header>
    <div class="logo">🔒 <span>СЕЙФ</span> 250</div>
    <div class="tagline">ЗНАЙДИ ВИГРАШНУ КЛІТИНКУ</div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="count">0</div>
      <div class="stat-label">Відкрито</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value">250</div>
      <div class="stat-label">Всього</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="remain">250</div>
      <div class="stat-label">Залишилось</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress"></div>
    </div>
  </div>

  <div class="status-wrap">
    <span class="status connecting" id="status">ПІДКЛЮЧЕННЯ...</span>
  </div>

  <!-- 🔥 ЛІДЕРБОРД -->
  <div class="leaderboard-container">
    <h2 class="leader-title">🏆 ЛІДЕРБОРД</h2>
    <div id="leaderboard" class="leader-list"></div>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>

  <footer>SAFE-250 &nbsp;·&nbsp; REAL-TIME</footer>

  <script>window.API_URL = "{{ api_url }}";</script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
